<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch Shuaib: Prova Edition</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #0f172a; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; }
        
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
        }

        canvas { display: block; width: 100%; height: 100%; }

        #ui { 
            position: absolute; top: 20px; width: 100%; display: flex; 
            justify-content: space-around; color: #f472b6; font-weight: bold; 
            font-size: 1.4rem; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px rgba(244, 114, 182, 0.5);
        }

        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; color: white; text-align: center;
        }

        button { 
            padding: 18px 45px; font-size: 22px; background: #f472b6; color: white; 
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 5px #be185d; transition: 0.2s;
        }

        button:active { transform: translateY(3px); box-shadow: 0 2px #be185d; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">
        <div id="ui">
            <div>Level: <span id="lvl">1</span></div>
            <div>Score: <span id="score">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay">
            <h1 style="color: #f472b6; margin-bottom: 5px;">CATCH SHUAIB! 🏃‍♂️</h1>
            <p style="margin-bottom: 25px; opacity: 0.8;">Tap the screen edges to move Prova!</p>
            <button onclick="startGame()">START MISSION 🌸</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const lvlEl = document.getElementById('lvl');
    const bgMusic = document.getElementById('bgMusic');

    const provaImg = new Image();
    provaImg.src = '1000017694-removebg-preview.png'; 
    const shuaibImg = new Image();
    shuaibImg.src = 'a97cf831-5384-4688-ac64-a6430ba0cc45-1_all_7690-removebg-preview.png';

    let gameActive = false;
    let score = 0;
    let level = 1;

    // Bigger sizes & physics
    let charSize = 90; 
    let prova = { x: 50, y: 50, vx: 0, vy: 0, speed: 6 };
    let shuaib = { x: 200, y: 200, vx: 3, vy: 3 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        bgMusic.play().catch(() => console.log("Music interaction required"));
        gameActive = true;
        score = 0; level = 1;
        prova.vx = prova.speed;
        requestAnimationFrame(gameLoop);
    }

    // EASIER CONTROLS: Detects taps relative to the character or screen quadrants
    canvas.addEventListener('pointerdown', e => {
        if (!gameActive) return;
        const x = e.clientX;
        const y = e.clientY;
        const w = canvas.width;
        const h = canvas.height;

        prova.vx = 0; prova.vy = 0;

        if (y < h * 0.25) { prova.vy = -prova.speed; } 
        else if (y > h * 0.75) { prova.vy = prova.speed; } 
        else if (x < w * 0.5) { prova.vx = -prova.speed; } 
        else { prova.vx = prova.speed; }
    });

    function drawCircularImage(img, x, y, size, borderColor) {
        ctx.save();
        
        // 1. Shadow/Glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = borderColor;
        
        // 2. Draw White Border Circle
        ctx.beginPath();
        ctx.arc(x + size/2, y + size/2, size/2 + 4, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();

        // 3. Clip the image into a circle
        ctx.beginPath();
        ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI * 2);
        ctx.clip();
        
        if (img.complete) {
            ctx.drawImage(img, x, y, size, size);
        } else {
            ctx.fillStyle = "#334155";
            ctx.fill();
        }
        
        ctx.restore();

        // 4. Draw Accent Ring
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x + size/2, y + size/2, size/2 + 4, 0, Math.PI * 2);
        ctx.stroke();
    }

    function update() {
        if (!gameActive) return;

        prova.x += prova.vx;
        prova.y += prova.vy;
        
        // Boundaries
        if (prova.x < 0) prova.x = 0;
        if (prova.x > canvas.width - charSize) prova.x = canvas.width - charSize;
        if (prova.y < 0) prova.y = 0;
        if (prova.y > canvas.height - charSize) prova.y = canvas.height - charSize;

        shuaib.x += shuaib.vx;
        shuaib.y += shuaib.vy;
        if (shuaib.x < 0 || shuaib.x > canvas.width - charSize) shuaib.vx *= -1;
        if (shuaib.y < 0 || shuaib.y > canvas.height - charSize) shuaib.vy *= -1;

        let dist = Math.hypot((prova.x + charSize/2) - (shuaib.x + charSize/2), (prova.y + charSize/2) - (shuaib.y + charSize/2));
        if (dist < charSize * 0.8) {
            score += 10;
            scoreEl.innerText = score;
            shuaib.x = Math.random() * (canvas.width - charSize);
            shuaib.y = Math.random() * (canvas.height - charSize);
            
            if (score % 50 === 0) {
                level++;
                lvlEl.innerText = level;
                shuaib.vx *= 1.15; shuaib.vy *= 1.15;
                prova.speed += 0.4;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw characters with round format & borders
        drawCircularImage(shuaibImg, shuaib.x, shuaib.y, charSize, "#60a5fa"); // Blue border for Shuaib
        drawCircularImage(provaImg, prova.x, prova.y, charSize, "#f472b6");   // Pink border for Prova
    }

    function gameLoop() {
        update(); draw();
        if (gameActive) requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
