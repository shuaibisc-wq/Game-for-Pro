<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch Shuaib: Prova's Quest</title>
    <style>
        * { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { text-align: center; font-family: 'Poppins', sans-serif; background: #1a1a2e; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; color: white; }
        
        #game-container { position: relative; flex-grow: 1; width: 100%; background: #16213e; overflow: hidden; border-bottom: 8px solid #e94560; }
        canvas { display: block; width: 100%; height: 100%; }

        /* UI Styling */
        #ui-bar { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 5; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 15px; border: 1px solid #e94560; font-size: 1.1rem; }

        /* Dialog Box */
        #dialog-cloud { position: absolute; background: white; color: #333; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; font-weight: bold; pointer-events: none; display: none; transition: 0.3s; z-index: 6; }
        #dialog-cloud::after { content: ''; position: absolute; bottom: -10px; left: 20px; border-width: 10px 10px 0; border-style: solid; border-color: white transparent; }

        /* Overlays */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 26, 46, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 40px; }
        h1 { color: #e94560; margin: 0; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #8892b0; margin: 15px 0; }
        
        button { padding: 18px 45px; font-size: 22px; background: #e94560; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px #950740; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 0px #950740; }
        
        .level-up-text { position: absolute; font-size: 3rem; color: #f9d342; font-weight: bold; pointer-events: none; animation: zoomOut 1s forwards; z-index: 20; }
        @keyframes zoomOut { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-bar">
        <div class="stat-box">Level: <span id="lvl">1</span></div>
        <div class="stat-box">Score: <span id="score">0</span></div>
    </div>
    <div id="dialog-cloud">Catch me if you can!</div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h1>Catch Shuaib</h1>
        <p>He's got the ice cream! Use your finger to help Prova catch him before he eats it all!</p>
        <button onclick="startGame()">START MISSION 🚀</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const dialog = document.getElementById('dialog-cloud');
    const scoreEl = document.getElementById('score');
    const lvlEl = document.getElementById('lvl');

    let gameActive = false;
    let score = 0;
    let level = 1;
    let particles = [];
    let powerups = [];

    let prova = { x: 100, y: 100, targetX: 100, targetY: 100, speed: 0.1, size: 50 };
    let shuaib = { x: 300, y: 300, vx: 3, vy: 3, size: 50 };

    const quotes = ["Stop running! 😂", "Almost had me!", "Too slow, Prova!", "Look over there! 🍦", "I'm the flash! ⚡"];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function startGame() {
        overlay.style.display = 'none';
        gameActive = true;
        score = 0; level = 1;
        scoreEl.innerText = score;
        lvlEl.innerText = level;
        requestAnimationFrame(gameLoop);
        setInterval(changeQuote, 3000);
        setInterval(spawnPowerup, 8000);
    }

    function changeQuote() {
        if(!gameActive) return;
        dialog.style.display = 'block';
        dialog.innerText = quotes[Math.floor(Math.random()*quotes.length)];
    }

    function spawnPowerup() {
        if(!gameActive) return;
        powerups.push({
            x: Math.random() * (canvas.width - 40) + 20,
            y: Math.random() * (canvas.height - 40) + 20,
            type: Math.random() > 0.5 ? '💖' : '🧲',
            life: 300
        });
    }

    canvas.addEventListener('pointermove', e => {
        prova.targetX = e.clientX;
        prova.targetY = e.clientY;
    });

    function createExplosion(x, y, color) {
        for(let i=0; i<20; i++) {
            particles.push({
                x, y, 
                vx: (Math.random()-0.5)*10, 
                vy: (Math.random()-0.5)*10, 
                life: 1.0, 
                color
            });
        }
    }

    function update() {
        if (!gameActive) return;

        // Prova smooth easing movement
        prova.x += (prova.targetX - prova.x) * prova.speed;
        prova.y += (prova.targetY - prova.y) * prova.speed;

        // Shuaib bounce movement
        shuaib.x += shuaib.vx;
        shuaib.y += shuaib.vy;

        if (shuaib.x < 0 || shuaib.x > canvas.width - 50) shuaib.vx *= -1;
        if (shuaib.y < 0 || shuaib.y > canvas.height - 50) shuaib.vy *= -1;

        // Dialog following Shuaib
        dialog.style.left = (shuaib.x) + "px";
        dialog.style.top = (shuaib.y - 60) + "px";

        // Collision with Shuaib
        let dist = Math.hypot(prova.x - shuaib.x, prova.y - shuaib.y);
        if (dist < 50) {
            score += 10;
            scoreEl.innerText = score;
            createExplosion(shuaib.x, shuaib.y, '#e94560');
            
            // Level up logic
            if (score % 50 === 0) {
                level++;
                lvlEl.innerText = level;
                shuaib.vx *= 1.2;
                shuaib.vy *= 1.2;
                showLevelText();
            }

            // Reposition Shuaib
            shuaib.x = Math.random() * (canvas.width - 50);
            shuaib.y = Math.random() * (canvas.height - 50);
        }

        // Powerup logic
        powerups.forEach((p, i) => {
            p.life--;
            if (Math.hypot(prova.x - p.x, prova.y - p.y) < 40) {
                if(p.type === '💖') { shuaib.vx *= 0.5; shuaib.vy *= 0.5; setTimeout(() => { shuaib.vx *= 2; shuaib.vy *= 2; }, 3000); }
                if(p.type === '🧲') { prova.speed = 0.3; setTimeout(() => prova.speed = 0.1, 4000); }
                powerups.splice(i, 1);
            }
            if(p.life <= 0) powerups.splice(i, 1);
        });

        // Particle update
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    function showLevelText() {
        const div = document.createElement('div');
        div.className = 'level-up-text';
        div.innerText = "LEVEL UP!";
        div.style.left = "50%"; div.style.top = "50%";
        div.style.transform = "translate(-50%, -50%)";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1000);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Powerups
        ctx.font = "30px Arial";
        powerups.forEach(p => ctx.fillText(p.type, p.x, p.y));

        // Draw Particles
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Draw Characters
        ctx.font = "50px Arial";
        ctx.fillText("🙋‍♂️🍦", shuaib.x, shuaib.y + 40);
        ctx.fillText("👸", prova.x - 25, prova.y + 20);
    }

    function gameLoop() {
        update(); draw();
        if (gameActive) requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
