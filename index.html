<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Prova, From Shuaib</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { text-align: center; font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff0f6; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #game-container { position: relative; flex-grow: 1; width: 100%; background: linear-gradient(to bottom, #ffdde1, #ee9ca7); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; color: #ff3399; font-size: 1.4rem; z-index: 5; background: rgba(255,255,255,0.3); padding: 5px 0; border-radius: 10px; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 30px; text-align: center; }
        #shuaib-msg { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: white; padding: 8px 15px; border-radius: 20px; border: 2px solid #ff3399; font-size: 0.9rem; color: #ff3399; display: none; z-index: 8; box-shadow: 0 4px 10px rgba(0,0,0,0.1); white-space: nowrap; }
        button { padding: 15px 40px; font-size: 20px; background: #ff3399; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px #b30059; transition: 0.2s; font-weight: bold; }
        button:active { transform: translateY(4px); box-shadow: 0 2px #b30059; }
        .pink-text { color: #ff3399; font-weight: bold; }
        .surprise-btn { margin-top:10px; background:#ff99cc; font-size:16px; padding:10px 20px; box-shadow: 0 3px #b3668c; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div>💖 <span id="score">0</span></div>
        <div>⏳ <span id="timer">30</span>s</div>
    </div>
    <div id="shuaib-msg"></div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h2 class="pink-text">🌸 Prova's Special Game 🌸</h2>
        <p>I made this just for you! Catch the treats for the kitty.</p>
        <button onclick="startGame()">Start Game, Prova! ✨</button>
        <p style="font-size: 0.8rem; margin-top: 15px;">Made with 💖 by Shuaib</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const overlay = document.getElementById('overlay');
    const msgBox = document.getElementById('shuaib-msg');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let timeLeft = 30;
    let gameActive = false;
    let items = [];
    let hearts = [];
    let kitty = { x: canvas.width/2 - 35, y: canvas.height - 110, emoji: "🐱" };
    let kittyTimer = null;

    const msgs = [
        "You're doing great, Prova!",
        "Nice catch! 🍦",
        "The kitty loves you!",
        "Shuaib is cheering for you!",
        "Wow, such a high score!",
        "You're the best gamer! 👸"
    ];

    function showShuaibMsg(text) {
        msgBox.innerText = "Shuaib: " + text;
        msgBox.style.display = 'block';
        setTimeout(() => { msgBox.style.display = 'none'; }, 2000);
    }

    function setKittyFace(face, delay) {
        if (kittyTimer) clearTimeout(kittyTimer);
        kitty.emoji = face;
        kittyTimer = setTimeout(() => {
            kitty.emoji = "🐱";
            kittyTimer = null;
        }, delay);
    }

    function startGame() {
        score = 0; timeLeft = 30; items = []; hearts = []; kitty.emoji = "🐱";
        scoreEl.innerText = score;
        overlay.style.display = 'none';
        gameActive = true;
        
        let timerId = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerId);
                endGame();
            }
        }, 1000);

        spawnItem();
        requestAnimationFrame(gameLoop);
    }

    function spawnItem() {
        if (!gameActive) return;
        const types = [{e:'🍦',p:10}, {e:'🍫',p:15}, {e:'🌸',p:5}, {e:'☁️',p:-20}];
        let t = types[Math.floor(Math.random()*types.length)];
        items.push({ x: Math.random()*(canvas.width-60)+30, y: -50, s: Math.random()*3+3, ...t });
        setTimeout(spawnItem, 800);
    }

    canvas.addEventListener('pointermove', e => {
        kitty.x = e.clientX - 35;
    });

    function createHearts(x, y) {
        for(let i=0; i<5; i++) {
            hearts.push({ x, y, dx:(Math.random()-0.5)*5, dy:-Math.random()*5-2, o:1 });
        }
    }

    function update() {
        items.forEach((item, i) => {
            item.y += item.s;
            if (item.y > kitty.y - 20 && item.x > kitty.x - 20 && item.x < kitty.x + 80) {
                score += item.p;
                scoreEl.innerText = score;
                if(item.p > 0) {
                    createHearts(item.x, item.y);
                    if(Math.random() > 0.7) showShuaibMsg(msgs[Math.floor(Math.random()*msgs.length)]);
                } else {
                    setKittyFace("😿", 1000); // Yap! Sad kitty for 1 second.
                    showShuaibMsg("Careful, Prova! I'm here! ☁️");
                }
                items.splice(i, 1);
            }
            if (item.y > canvas.height) items.splice(i, 1);
        });

        hearts.forEach((h, i) => {
            h.x += h.dx; h.y += h.dy; h.o -= 0.02;
            if(h.o <= 0) hearts.splice(i, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = "70px Arial";
        ctx.fillText(kitty.emoji, kitty.x, kitty.y);

        ctx.font = "40px Arial";
        items.forEach(item => ctx.fillText(item.e, item.x, item.y));

        hearts.forEach(h => {
            ctx.globalAlpha = h.o;
            ctx.font = "40px Arial";
            ctx.fillText("❤️", h.x, h.y);
            ctx.globalAlpha = 1;
        });
    }

    function endGame() {
        gameActive = false;
        overlay.innerHTML = `
            <h2 class="pink-text">Game Over, Prova!</h2>
            <div style="font-size:60px">💝🐱✨</div>
            <p>Your Final Score: <b>${score}</b></p>
            <p><i>"I hope this game made you smile today!" - Shuaib</i></p>
            <button onclick="location.reload()">Play Again</button>
            <button onclick="alert('You are my favorite person! ❤️')" class="surprise-btn">Click for a Surprise</button>
        `;
        overlay.style.display = 'flex';
    }

    function gameLoop() {
        if (gameActive || hearts.length > 0) {
            update(); draw();
            requestAnimationFrame(gameLoop);
        }
    }
</script>
</body>
</html>
