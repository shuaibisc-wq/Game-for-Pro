<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prova's Ice Cream Quest 🍦</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap');
        
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #ffe4e6; 
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; height: 100vh;
        }

        #game-area { 
            position: relative; width: 100%; flex-grow: 1;
            background: linear-gradient(135deg, #fff1f2 0%, #fae8ff 100%);
            border: 8px solid #fda4af;
            border-radius: 20px 20px 0 0;
            margin-top: 10px; overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #ui { 
            position: absolute; top: 15px; width: 100%; display: flex; 
            justify-content: space-around; color: #be185d; font-weight: 600; 
            z-index: 10; font-size: 1.1rem; pointer-events: none;
        }

        #controls { 
            height: 220px; background: white; 
            display: grid; grid-template-areas: ". up ." "left . right" ". down .";
            justify-content: center; align-content: center; gap: 15px;
            border-top: 2px solid #fce7f3; box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
        }

        .btn { 
            width: 60px; height: 60px; background: #fff1f2; color: #fb7185; 
            border: 2px solid #fecdd3; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.1s;
        }
        .btn:active { transform: scale(0.9); background: #f43f5e; color: white; }
        .up { grid-area: up; } .down { grid-area: down; } .left { grid-area: left; } .right { grid-area: right; }

        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100; text-align: center;
        }
        h1 { font-family: 'Pacifico', cursive; color: #e11d48; font-size: 2.2rem; margin: 0; }
        button#start-btn { 
            padding: 12px 40px; font-size: 1.1rem; background: #fb7185; color: white; 
            border: none; border-radius: 50px; cursor: pointer; font-weight: 600;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="game-area">
        <div id="ui">
            <div>🌸 Score: <span id="score">0</span></div>
            <div>✨ Lvl: <span id="lvl">1</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="msg">Sweet Catch</h1>
            <p id="sub-msg" style="color: #9f1239;">Help Prova find Shuaib!</p>
            <button id="start-btn" onclick="startGame()">Play ✨</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn up" onpointerdown="move('up')">▲</div>
        <div class="btn left" onpointerdown="move('left')">◀</div>
        <div class="btn right" onpointerdown="move('right')">▶</div>
        <div class="btn down" onpointerdown="move('down')">▼</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const lvlEl = document.getElementById('lvl');
    
    // IMAGE LOADING - Paths updated for visibility
    const provaImg = new Image(); provaImg.src = '1000017694-removebg-preview.png'; 
    const shuaibImg = new Image(); shuaibImg.src = 'a97cf831-5384-4688-ac64-a6430ba0cc45-1_all_7690.jpg';
    const kittyImg = new Image(); kittyImg.src = 'kitty.jpg';
    const iceCreamImg = new Image(); iceCreamImg.src = 'discone.jpg';

    let gameActive = false;
    let score = 0; let level = 1;
    let charSize = 40; // Set to 40 as requested
    let prova = { x: 50, y: 50, vx: 0, vy: 0, speed: 2.5 }; 
    let shuaib = { x: 200, y: 200, vx: 1.5, vy: 1.5 }; 
    let kitties = [];
    let twinkleTimer = 0;

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function move(dir) {
        prova.vx = 0; prova.vy = 0;
        if(dir === 'up') prova.vy = -prova.speed;
        if(dir === 'down') prova.vy = prova.speed;
        if(dir === 'left') prova.vx = -prova.speed;
        if(dir === 'right') prova.vx = prova.speed;
    }

    function spawnKitty() {
        if(!gameActive) return;
        kitties.push({
            x: Math.random() * (canvas.width - charSize),
            y: Math.random() * (canvas.height - charSize),
            life: 450 
        });
        setTimeout(spawnKitty, Math.max(2000, 5000 - (level * 200)));
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('bgMusic').play().catch(()=>{});
        gameActive = true; score = 0; level = 1; kitties = [];
        prova.x = 20; prova.y = 20; prova.vx = 0; prova.vy = 0;
        scoreEl.innerText = score; lvlEl.innerText = level;
        spawnKitty();
        requestAnimationFrame(gameLoop);
    }

    function drawRoundFrame(img, x, y, size, color) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2);
        ctx.clip();
        
        // Safety check to draw circle if image hasn't loaded yet
        if(img.complete && img.naturalWidth !== 0) {
            ctx.drawImage(img, x, y, size, size);
        } else {
            ctx.fillStyle = color;
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            ctx.textAlign = "center";
            ctx.fillText("IMG", x + size/2, y + size/2 + 5);
        }
        ctx.restore();
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
        ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.stroke();
    }

    function update() {
        if(!gameActive) return;

        prova.x += prova.vx; prova.y += prova.vy;
        if(prova.x < 0) prova.x = 0; if(prova.x > canvas.width - charSize) prova.x = canvas.width - charSize;
        if(prova.y < 0) prova.y = 0; if(prova.y > canvas.height - charSize) prova.y = canvas.height - charSize;

        shuaib.x += shuaib.vx; shuaib.y += shuaib.vy;
        if(shuaib.x < 0 || shuaib.x > canvas.width - charSize) shuaib.vx *= -1;
        if(shuaib.y < 0 || shuaib.y > canvas.height - charSize) shuaib.vy *= -1;

        if(Math.hypot(prova.x - shuaib.x, prova.y - shuaib.y) < charSize) {
            score += 10; scoreEl.innerText = score;
            shuaib.x = Math.random() * (canvas.width - charSize);
            shuaib.y = Math.random() * (canvas.height - charSize);
            twinkleTimer = 40;
            if(score % 50 === 0) { level++; lvlEl.innerText = level; }
        }

        kitties.forEach((k, i) => {
            k.life--;
            if(Math.hypot(prova.x - k.x, prova.y - k.y) < charSize - 5) {
                gameActive = false;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('msg').innerText = "Try Again! 🍦";
                document.getElementById('sub-msg').innerText = "Score: " + score;
            }
            if(k.life <= 0) kitties.splice(i, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawRoundFrame(shuaibImg, shuaib.x, shuaib.y, charSize, "#60a5fa");
        drawRoundFrame(provaImg, prova.x, prova.y, charSize, "#f472b6");
        kitties.forEach(k => drawRoundFrame(kittyImg, k.x, k.y, charSize, "#fbbf24"));

        if(twinkleTimer > 0) {
            const size = 80;
            ctx.globalAlpha = twinkleTimer / 40;
            ctx.drawImage(iceCreamImg, canvas.width/2 - size/2, canvas.height/2 - size/2, size, size);
            ctx.globalAlpha = 1.0;
            twinkleTimer--;
        }
    }

    function gameLoop() {
        update(); draw();
        if(gameActive) requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
