<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Prova Game 😈</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{overflow:hidden;font-family:sans-serif;}

#ui{
 position:absolute;
 top:10px;
 width:100%;
 text-align:center;
 color:#e11d48;
 font-weight:bold;
 z-index:5;
}

#overlay{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:rgba(255,255,255,0.9);
 z-index:10;
}

button{
 padding:12px 30px;
 border:none;
 border-radius:30px;
 background:#fb7185;
 color:white;
 font-size:18px;
}
</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span> | Lvl: <span id="lvl">1</span>
</div>

<canvas id="gameCanvas"></canvas>

<div id="overlay">
<h1>Catch Shuaib 😈🍦</h1>
<button onclick="startGame()">Start</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// IMAGES
const provaImg = new Image(); provaImg.src = '1000017694-removebg-preview.png';
const shuaibImg = new Image(); shuaibImg.src = 'a97cf831-5384-4688-ac64-a6430ba0cc45-1_all_7690-removebg-preview.png';

let gameActive=false, score=0, level=1;
const size=45;

let prova={x:50,y:50,vx:0,vy:0};
let shuaib={x:300,y:300,vx:0,vy:0};

let walls=[];

// RESIZE
function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
 createWalls();
}
window.addEventListener("resize",resize);

// 🌈 ANIMATED WALLS
function createWalls(){
 walls=[];
 let gap=140;

 for(let i=0;i<6;i++){
  walls.push({
   x:Math.random()*canvas.width,
   y:Math.random()*canvas.height,
   w:120,
   h:15,
   dx:(Math.random()*2-1)*0.5,
   dy:(Math.random()*2-1)*0.5
  });
 }
}

// MOVE WALLS
function animateWalls(){
 walls.forEach(w=>{
  w.x+=w.dx;
  w.y+=w.dy;

  if(w.x<0 || w.x+w.w>canvas.width) w.dx*=-1;
  if(w.y<0 || w.y+w.h>canvas.height) w.dy*=-1;
 });
}

// COLLISION
function collide(x,y){
 return walls.some(w =>
  x < w.x+w.w &&
  x+size > w.x &&
  y < w.y+w.h &&
  y+size > w.y
 );
}

// START
function startGame(){
 resize();
 document.getElementById("overlay").style.display="none";

 gameActive=true;
 score=0;
 level=1;

 prova={x:50,y:50,vx:0,vy:0};
 shuaib={x:300,y:300,vx:0,vy:0};

 requestAnimationFrame(loop);
}

// TOUCH CONTROL
let sx,sy;
addEventListener("touchstart",e=>{
 sx=e.touches[0].clientX;
 sy=e.touches[0].clientY;
});
addEventListener("touchend",e=>{
 if(!gameActive) return;

 let dx=e.changedTouches[0].clientX-sx;
 let dy=e.changedTouches[0].clientY-sy;

 prova.vx+=dx*0.05;
 prova.vy+=dy*0.05;
});

// DRAW
function draw(img,x,y,color){
 if(!img.complete) return;

 ctx.drawImage(img,x,y,size,size);
}

// BACKGROUND
function bg(){
 let g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
 g.addColorStop(0,"#ffe4e6");
 g.addColorStop(1,"#fbcfe8");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 🧠 SMART AI (PREDICT PLAYER)
function smartAI(){
 let futureX = prova.x + prova.vx*10;
 let futureY = prova.y + prova.vy*10;

 let dx = futureX - shuaib.x;
 let dy = futureY - shuaib.y;

 let dist = Math.hypot(dx,dy);

 if(dist > 1){
  shuaib.vx += (dx/dist)*0.5;
  shuaib.vy += (dy/dist)*0.5;
 }

 // speed limit
 let speed = Math.hypot(shuaib.vx,shuaib.vy);
 let max = 3 + level*0.3;

 if(speed > max){
  shuaib.vx = (shuaib.vx/speed)*max;
  shuaib.vy = (shuaib.vy/speed)*max;
 }

 // bounce
 if(collide(shuaib.x+shuaib.vx,shuaib.y)) shuaib.vx*=-1;
 if(collide(shuaib.x,shuaib.y+shuaib.vy)) shuaib.vy*=-1;

 shuaib.x += shuaib.vx;
 shuaib.y += shuaib.vy;
}

// LOOP
function loop(){
 if(!gameActive) return;

 bg();

 animateWalls();

 ctx.fillStyle="#fb7185";
 walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

 // player physics
 prova.vx*=0.9;
 prova.vy*=0.9;

 if(!collide(prova.x+prova.vx,prova.y)) prova.x+=prova.vx;
 if(!collide(prova.x,prova.y+prova.vy)) prova.y+=prova.vy;

 smartAI();

 // catch
 if(Math.hypot(prova.x-shuaib.x,prova.y-shuaib.y)<size){
  score+=10;
  document.getElementById("score").innerText=score;

  if(score%50===0){
   level++;
   document.getElementById("lvl").innerText=level;
  }
 }

 draw(shuaibImg,shuaib.x,shuaib.y);
 draw(provaImg,prova.x,prova.y);

 requestAnimationFrame(loop);
}
</script>

</body>
</html>
