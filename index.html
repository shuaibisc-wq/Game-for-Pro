<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova's Maze 🍦</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { overflow:hidden; font-family:sans-serif; }

#ui{
 position:absolute;
 top:10px;
 width:100%;
 text-align:center;
 color:#e11d48;
 font-weight:bold;
 z-index:5;
}

#overlay{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:rgba(255,255,255,0.9);
 z-index:10;
}

button{
 padding:12px 30px;
 border:none;
 border-radius:30px;
 background:#fb7185;
 color:white;
 font-size:18px;
}
</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span> | Lvl: <span id="lvl">1</span>
</div>

<canvas id="gameCanvas"></canvas>

<div id="overlay">
<h1>Catch Shuaib 🍦</h1>
<button onclick="startGame()">Start</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const provaImg = new Image(); provaImg.src = '1000017694-removebg-preview.png';
const shuaibImg = new Image(); shuaibImg.src = 'a97cf831-5384-4688-ac64-a6430ba0cc45-1_all_7690-removebg-preview.png';
const kittyImg = new Image(); kittyImg.src = 'kitty.jpg';
const iceImg = new Image(); iceImg.src = 'discone.jpg';

let score=0, level=1, gameActive=false;

const size=45;
let prova={x:10,y:10,vx:0,vy:0};
let shuaib={x:200,y:200,vx:2,vy:2};
let walls=[], kitties=[];

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
 createMaze();
}
window.addEventListener("resize",resize);

function createMaze(){
 walls=[];
 let gap=size+15;

 for(let x=gap;x<canvas.width;x+=gap*2){
  for(let y=0;y<canvas.height;y+=gap){
   walls.push({x:x,y:y,w:10,h:gap});
  }
 }

 for(let y=gap;y<canvas.height;y+=gap*2){
  for(let x=0;x<canvas.width;x+=gap){
   walls.push({x:x,y:y,w:gap,h:10});
  }
 }
}

function startGame(){
 resize();
 document.getElementById("overlay").style.display="none";

 gameActive=true;
 score=0; level=1;

 prova={x:10,y:10,vx:0,vy:0};
 shuaib={x:canvas.width-80,y:canvas.height-80,vx:2,vy:2};

 spawnKitty();
 loop();
}

// swipe
let sx,sy;
addEventListener("touchstart",e=>{
 sx=e.touches[0].clientX;
 sy=e.touches[0].clientY;
});
addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-sx;
 let dy=e.changedTouches[0].clientY-sy;

 if(Math.abs(dx)>Math.abs(dy)){
  prova.vx+=dx>0?3:-3;
 }else{
  prova.vy+=dy>0?3:-3;
 }
});

function collide(x,y){
 return walls.some(w =>
  x < w.x+w.w &&
  x+size > w.x &&
  y < w.y+w.h &&
  y+size > w.y
 );
}

function spawnKitty(){
 if(!gameActive) return;

 let x=Math.random()*(canvas.width-size);
 let y=Math.random()*(canvas.height-size);

 if(!collide(x,y)){
  kitties.push({x,y,life:200});
 }

 setTimeout(spawnKitty,3000);
}

function draw(img,x,y,color){
 ctx.save();
 ctx.beginPath();
 ctx.arc(x+size/2,y+size/2,size/2,0,Math.PI*2);
 ctx.clip();
 ctx.drawImage(img,x,y,size,size);
 ctx.restore();

 ctx.strokeStyle=color;
 ctx.beginPath();
 ctx.arc(x+size/2,y+size/2,size/2,0,Math.PI*2);
 ctx.stroke();
}

function bg(){
 let g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
 g.addColorStop(0,"#ffe4e6");
 g.addColorStop(1,"#fbcfe8");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,canvas.width,canvas.height);
}

function loop(){
 if(!gameActive) return;

 bg();

 ctx.fillStyle="#fb7185";
 walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

 // smooth
 prova.vx*=0.9;
 prova.vy*=0.9;

 if(!collide(prova.x+prova.vx,prova.y)) prova.x+=prova.vx;
 if(!collide(prova.x,prova.y+prova.vy)) prova.y+=prova.vy;

 // enemy
 let dx=prova.x-shuaib.x;
 let dy=prova.y-shuaib.y;

 if(Math.hypot(dx,dy)<200){
  shuaib.vx+=dx*0.01;
  shuaib.vy+=dy*0.01;
 }

 if(collide(shuaib.x+shuaib.vx,shuaib.y)) shuaib.vx*=-1;
 if(collide(shuaib.x,shuaib.y+shuaib.vy)) shuaib.vy*=-1;

 shuaib.x+=shuaib.vx;
 shuaib.y+=shuaib.vy;

 // catch
 if(Math.hypot(prova.x-shuaib.x,prova.y-shuaib.y)<size){
  score+=10;
  document.getElementById("score").innerText=score;

  if(score%50===0){
   level++;
   document.getElementById("lvl").innerText=level;
  }

  shuaib.x=Math.random()*canvas.width;
  shuaib.y=Math.random()*canvas.height;
 }

 // kitty
 kitties.forEach((k,i)=>{
  k.life--;

  if(Math.hypot(prova.x-k.x,prova.y-k.y)<30){
   alert("Game Over 😭");
   location.reload();
  }

  if(k.life<=0) kitties.splice(i,1);

  draw(kittyImg,k.x,k.y,"red");
 });

 draw(shuaibImg,shuaib.x,shuaib.y,"blue");
 draw(provaImg,prova.x,prova.y,"pink");

 requestAnimationFrame(loop);
}
</script>

</body>
</html>
