<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prova's Maze Quest 🍦</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap');
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #fff1f2; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        #game-area { 
            position: relative; width: 100%; flex-grow: 1;
            background: #fffafa; border: 10px solid #fda4af; 
            border-radius: 20px; margin: 10px; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; color: #be185d; font-weight: 600; z-index: 10; }
        
        #controls { 
            height: 200px; background: white; display: grid; 
            grid-template-areas: ". up ." "left . right" ". down .";
            justify-content: center; align-content: center; gap: 12px;
            border-top: 4px solid #fce7f3;
        }
        .btn { 
            width: 55px; height: 55px; background: #fff1f2; color: #fb7185; 
            border: 2px solid #fecdd3; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; font-size: 20px;
        }
        .btn:active { background: #f43f5e; color: white; }
        .up { grid-area: up; } .down { grid-area: down; } .left { grid-area: left; } .right { grid-area: right; }

        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(4px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        h1 { font-family: 'Pacifico', cursive; color: #e11d48; margin: 0; }
        button { padding: 12px 40px; background: #fb7185; color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="game-area">
        <div id="ui">
            <div>🍦 Score: <span id="score">0</span></div>
            <div>🌟 Lvl: <span id="lvl">1</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="mainMsg">Sweet Maze</h1>
            <p id="subMsg" style="color: #9f1239;">Don't hit the Kitties or the Walls!</p>
            <button onclick="startGame()">Start! ✨</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn up" onpointerdown="move(0, -1)">▲</div>
        <div class="btn left" onpointerdown="move(-1, 0)">◀</div>
        <div class="btn right" onpointerdown="move(1, 0)">▶</div>
        <div class="btn down" onpointerdown="move(0, 1)">▼</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const lvlEl = document.getElementById('lvl');
    
    const provaImg = new Image(); provaImg.src = '1000017694-removebg-preview.png'; 
    const shuaibImg = new Image(); shuaibImg.src = 'a97cf831-5384-4688-ac64-a6430ba0cc45-1_all_7690-removebg-preview.png';
    const kittyImg = new Image(); kittyImg.src = 'kitty.jpg';
    const iceCreamImg = new Image(); iceCreamImg.src = 'discone.jpg';

    let gameActive = false;
    let score = 0; let level = 1;
    let charSize = 65; // Smaller frames
    let prova = { x: 40, y: 40, vx: 0, vy: 0, speed: 3.8 }; // Slower speed
    let shuaib = { x: 250, y: 250, vx: 2, vy: 2 };
    let kitties = [];
    let twinkle = 0;

    // Define internal walls (x, y, width, height)
    let walls = [];

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        setupWalls();
    }
    window.addEventListener('resize', resize);

    function setupWalls() {
        const w = canvas.width;
        const h = canvas.height;
        // Various internal walls
        walls = [
            {x: w*0.2, y: h*0.2, w: 20, h: h*0.3},
            {x: w*0.6, y: h*0.1, w: w*0.2, h: 20},
            {x: w*0.4, y: h*0.6, w: 20, h: h*0.2},
            {x: w*0.1, y: h*0.7, w: w*0.3, h: 20}
        ];
    }

    function move(x, y) {
        prova.vx = x * prova.speed;
        prova.vy = y * prova.speed;
    }

    function startGame() {
        resize();
        document.getElementById('overlay').style.display = 'none';
        gameActive = true; score = 0; level = 1; kitties = [];
        prova.x = 30; prova.y = 30; prova.vx = 0; prova.vy = 0;
        scoreEl.innerText = score; lvlEl.innerText = level;
        requestAnimationFrame(gameLoop);
    }

    function isColliding(rect1, rect2) {
        return rect1.x < rect2.x + rect2.w && rect1.x + rect1.w > rect2.x &&
               rect1.y < rect2.y + rect2.h && rect1.y + rect1.h > rect2.y;
    }

    function drawRoundFrame(img, x, y, size, color) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2);
        ctx.clip();
        if(img.complete) ctx.drawImage(img, x, y, size, size);
        ctx.restore();
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2); ctx.stroke();
    }

    function update() {
        if(!gameActive) return;

        // Prova movement & Wall Check
        let nextX = prova.x + prova.vx;
        let nextY = prova.y + prova.vy;

        let hitWallX = false;
        let hitWallY = false;

        // Boundary walls
        if(nextX < 0 || nextX > canvas.width - charSize) hitWallX = true;
        if(nextY < 0 || nextY > canvas.height - charSize) hitWallY = true;

        // Internal walls
        walls.forEach(w => {
            if(isColliding({x: nextX, y: prova.y, w: charSize, h: charSize}, w)) hitWallX = true;
            if(isColliding({x: prova.x, y: nextY, w: charSize, h: charSize}, w)) hitWallY = true;
        });

        if(!hitWallX) prova.x = nextX;
        if(!hitWallY) prova.y = nextY;

        // Shuaib movement & bounce off walls
        shuaib.x += shuaib.vx;
        shuaib.y += shuaib.vy;
        if(shuaib.x < 0 || shuaib.x > canvas.width - charSize) shuaib.vx *= -1;
        if(shuaib.y < 0 || shuaib.y > canvas.height - charSize) shuaib.vy *= -1;
        walls.forEach(w => {
            if(isColliding({x: shuaib.x, y: shuaib.y, w: charSize, h: charSize}, w)) {
                shuaib.vx *= -1; shuaib.vy *= -1;
            }
        });

        // Catch Logic
        if(Math.hypot(prova.x - shuaib.x, prova.y - shuaib.y) < 50) {
            score += 10; scoreEl.innerText = score;
            shuaib.x = Math.random() * (canvas.width - charSize);
            shuaib.y = Math.random() * (canvas.height - charSize);
            twinkle = 30;
            if(score % 50 === 0) { level++; lvlEl.innerText = level; shuaib.vx *= 1.1; }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Maze Walls
        ctx.fillStyle = "#fda4af";
        walls.forEach(w => {
            ctx.beginPath();
            ctx.roundRect(w.x, w.y, w.w, w.h, 10);
            ctx.fill();
        });

        drawRoundFrame(shuaibImg, shuaib.x, shuaib.y, charSize, "#60a5fa");
        drawRoundFrame(provaImg, prova.x, prova.y, charSize, "#f472b6");

        if(twinkle > 0) {
            ctx.globalAlpha = twinkle/30;
            ctx.drawImage(iceCreamImg, canvas.width/2-60, canvas.height/2-60, 120, 120);
            ctx.globalAlpha = 1; twinkle--;
        }
    }

    function gameLoop() {
        update(); draw();
        if(gameActive) requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
