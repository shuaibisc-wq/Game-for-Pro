<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch Shuaib: Pro Edition</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            /* REPLACE WITH YOUR BACKGROUND IMAGE LINK */
            background: url('background.jpg') center/cover; 
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* UI */
        #ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; color: white; font-weight: bold; font-size: 1.5rem; text-shadow: 2px 2px 4px #000; z-index: 10; pointer-events: none; }

        /* Menu Overlay */
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; color: white; padding: 20px;
        }

        button { 
            padding: 20px 50px; font-size: 24px; background: #ff3399; color: white; 
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 6px #b30059;
        }

        /* D-Pad Visual Guide (Optional - Hidden) */
        .controls-hint { position: absolute; bottom: 20px; color: rgba(255,255,255,0.5); font-size: 0.8rem; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">
        <div id="ui">
            <div>Level: <span id="lvl">1</span></div>
            <div>Score: <span id="score">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay">
            <h1>CATCH SHUAIB! 🏃‍♂️</h1>
            <p>Tap Up, Down, Left, or Right to move Prova!</p>
            <button onclick="startGame()">START GAME 🌸</button>
        </div>
        <div class="controls-hint">Tap edges of the screen to change direction</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const lvlEl = document.getElementById('lvl');
    const bgMusic = document.getElementById('bgMusic');

    // LOAD IMAGES
    const provaImg = new Image();
    provaImg.src = 'prova.png'; // Replace with your uploaded image name
    const shuaibImg = new Image();
    shuaibImg.src = 'shuaib.png'; // Replace with your uploaded image name

    let gameActive = false;
    let score = 0;
    let level = 1;

    let prova = { x: 50, y: 50, vx: 0, vy: 0, speed: 5, size: 70 };
    let shuaib = { x: 200, y: 200, vx: 3, vy: 3, size: 70 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        bgMusic.play().catch(() => console.log("Music needs interaction"));
        gameActive = true;
        score = 0; level = 1;
        prova.vx = prova.speed; // Start moving right
        requestAnimationFrame(gameLoop);
    }

    // 4-WAY TAP CONTROLS
    canvas.addEventListener('pointerdown', e => {
        const x = e.clientX;
        const y = e.clientY;
        const w = canvas.width;
        const h = canvas.height;

        // Reset velocities
        prova.vx = 0; prova.vy = 0;

        // Logic: Check which quadrant was tapped
        if (y < h * 0.3) { prova.vy = -prova.speed; } // Top 30% = UP
        else if (y > h * 0.7) { prova.vy = prova.speed; } // Bottom 30% = DOWN
        else if (x < w * 0.5) { prova.vx = -prova.speed; } // Left Half = LEFT
        else { prova.vx = prova.speed; } // Right Half = RIGHT
    });

    function update() {
        if (!gameActive) return;

        // Move Prova & Keep in Bounds
        prova.x += prova.vx;
        prova.y += prova.vy;
        if (prova.x < 0) prova.x = 0;
        if (prova.x > canvas.width - prova.size) prova.x = canvas.width - prova.size;
        if (prova.y < 0) prova.y = 0;
        if (prova.y > canvas.height - prova.size) prova.y = canvas.height - prova.size;

        // Move Shuaib
        shuaib.x += shuaib.vx;
        shuaib.y += shuaib.vy;
        if (shuaib.x < 0 || shuaib.x > canvas.width - shuaib.size) shuaib.vx *= -1;
        if (shuaib.y < 0 || shuaib.y > canvas.height - shuaib.size) shuaib.vy *= -1;

        // Catch Logic
        let dist = Math.hypot(prova.x - shuaib.x, prova.y - shuaib.y);
        if (dist < 60) {
            score += 10;
            scoreEl.innerText = score;
            shuaib.x = Math.random() * (canvas.width - 100);
            shuaib.y = Math.random() * (canvas.height - 100);
            
            if (score % 50 === 0) {
                level++;
                lvlEl.innerText = level;
                shuaib.vx *= 1.2; shuaib.vy *= 1.2;
                prova.speed += 0.5;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Shuaib
        if (shuaibImg.complete) {
            ctx.drawImage(shuaibImg, shuaib.x, shuaib.y, shuaib.size, shuaib.size);
        } else {
            ctx.font = "50px Arial";
            ctx.fillText("🙋‍♂️", shuaib.x, shuaib.y + 50);
        }

        // Draw Prova
        if (provaImg.complete) {
            ctx.drawImage(provaImg, prova.x, prova.y, prova.size, prova.size);
        } else {
            ctx.font = "50px Arial";
            ctx.fillText("👸", prova.x, prova.y + 50);
        }
    }

    function gameLoop() {
        update(); draw();
        if (gameActive) requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
