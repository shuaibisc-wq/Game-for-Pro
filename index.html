<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const provaImg = new Image(); provaImg.src = '1000017694-removebg-preview.png'; 
const shuaibImg = new Image(); shuaibImg.src = 'a97cf831-5384-4688-ac64-a6430ba0cc45-1_all_7690-removebg-preview.png';
const kittyImg = new Image(); kittyImg.src = 'kitty.jpg';
const iceCreamImg = new Image(); iceCreamImg.src = 'discone.jpg';

let gameActive = false, score = 0, level = 1, twinkle = 0;

const charSize = 45; 
const accel = 0.6;      // smooth acceleration
const friction = 0.90;  // slow down gradually
const maxSpeed = 4;

let prova = { x: 0, y: 0, vx: 0, vy: 0 };
let shuaib = { x: 0, y: 0, vx: 2, vy: 2 };
let walls = [], kitties = [];

// SWIPE CONTROL (improved)
let sX, sY;
window.addEventListener('touchstart', e => {
    sX = e.touches[0].clientX;
    sY = e.touches[0].clientY;
});
window.addEventListener('touchend', e => {
    if(!gameActive) return;
    const dX = e.changedTouches[0].clientX - sX;
    const dY = e.changedTouches[0].clientY - sY;

    if(Math.abs(dX) > Math.abs(dY)) {
        prova.vx += dX > 0 ? accel*3 : -accel*3;
    } else {
        prova.vy += dY > 0 ? accel*3 : -accel*3;
    }
});

// BETTER MAZE
function createMaze() {
    walls = [];
    const gap = 80;

    for(let i=0;i<canvas.width;i+=100){
        for(let j=0;j<canvas.height;j+=100){

            if(Math.random() > 0.3){
                walls.push({x:i, y:j, w:80, h:10});
            }
            if(Math.random() > 0.3){
                walls.push({x:i, y:j, w:10, h:80});
            }
        }
    }
}

function checkWall(px, py) {
    return walls.some(w =>
        px < w.x + w.w &&
        px + charSize > w.x &&
        py < w.y + w.h &&
        py + charSize > w.y
    );
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    createMaze();
}
window.addEventListener('resize', resize);

function startGame() {
    resize();
    document.getElementById('overlay').style.display = 'none';
    gameActive = true;
    score = 0;

    prova = { x: 20, y: 20, vx: 0, vy: 0 };
    shuaib = { x: canvas.width-80, y: canvas.height-80, vx: 2, vy: 2 };
    kitties = [];

    spawnKitty();
    requestAnimationFrame(gameLoop);
}

function spawnKitty() {
    if(!gameActive) return;

    let tries = 0;
    while(tries < 10){
        let kX = Math.random() * (canvas.width - charSize);
        let kY = Math.random() * (canvas.height - charSize);

        if(!checkWall(kX, kY)){
            kitties.push({ x: kX, y: kY, life: 300 });
            break;
        }
        tries++;
    }

    setTimeout(spawnKitty, 4000);
}

// DRAW
function drawFrame(img, x, y, color) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x + charSize/2, y + charSize/2, charSize/2, 0, Math.PI*2);
    ctx.clip();
    if(img.complete) ctx.drawImage(img, x, y, charSize, charSize);
    ctx.restore();

    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x + charSize/2, y + charSize/2, charSize/2, 0, Math.PI*2);
    ctx.stroke();
}

// BACKGROUND ✨
function drawBackground() {
    let grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grad.addColorStop(0, "#ffe4e6");
    grad.addColorStop(1, "#fbcfe8");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function gameLoop() {
    if(!gameActive) return;

    drawBackground();

    // walls
    ctx.fillStyle = "#fb7185";
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    // SMOOTH MOVEMENT
    prova.vx *= friction;
    prova.vy *= friction;

    prova.vx = Math.max(-maxSpeed, Math.min(maxSpeed, prova.vx));
    prova.vy = Math.max(-maxSpeed, Math.min(maxSpeed, prova.vy));

    if (!checkWall(prova.x + prova.vx, prova.y)) prova.x += prova.vx;
    if (!checkWall(prova.x, prova.y + prova.vy)) prova.y += prova.vy;

    // SHUAIB smoother bounce
    if (checkWall(shuaib.x + shuaib.vx, shuaib.y)) shuaib.vx *= -1;
    if (checkWall(shuaib.x, shuaib.y + shuaib.vy)) shuaib.vy *= -1;

    shuaib.x += shuaib.vx;
    shuaib.y += shuaib.vy;

    // CATCH
    if (Math.hypot(prova.x - shuaib.x, prova.y - shuaib.y) < charSize) {
        score += 10;
        document.getElementById('score').innerText = score;
        twinkle = 20;

        shuaib.x = Math.random() * (canvas.width - charSize);
        shuaib.y = Math.random() * (canvas.height - charSize);
    }

    // KITTIES (fair collision)
    kitties.forEach((k, i) => {
        k.life--;

        if (Math.hypot(prova.x - k.x, prova.y - k.y) < 30) {
            alert("Game Over 😭");
            location.reload();
        }

        if (k.life <= 0) kitties.splice(i, 1);

        drawFrame(kittyImg, k.x, k.y, "red");
    });

    drawFrame(shuaibImg, shuaib.x, shuaib.y, "#60a5fa");
    drawFrame(provaImg, prova.x, prova.y, "#f472b6");

    if (twinkle > 0) {
        ctx.drawImage(iceCreamImg, canvas.width/2-60, canvas.height/2-100, 120, 120);
        twinkle--;
    }

    requestAnimationFrame(gameLoop);
}
</script>
